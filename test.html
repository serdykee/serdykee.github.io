<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
  <title>Danh sách các tệp</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>
<body>
    <div class="header" id="header"></div>

  <h1>Welcome to my GitHub Page!</h1>
  <p>This is the main content of the page.</p>

  
  
  <h1>Danh sách các tệp</h1>
  <ul id="file-list"></ul>
<div class="footer" id="footer"></div>
  <script>
    $(document).ready(function() {
        $.ajax({
            url: "https://api.github.com/repos/serdykee/serdykee.github.io/contents/cert",
            dataType: "json",
            success: function(data) {
                $.each(data, function(index, file) {
                    var fileUrl = file.download_url;
                    var fileName = file.name;
                    var listItem = "<li><a href='" + fileUrl + "' download>" + fileName + "</a></li>";
                    $("#file-list").append(listItem);
                });
            }
        });
    });
  </script>
    <script>
    // Load header
    fetch("header.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;
      });

    // Load footer
    fetch("footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>
  
</body>
</html>
